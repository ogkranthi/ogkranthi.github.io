name: Update featured post

on:
  push:
    branches: [main]
    paths:
      - '*.html'

permissions:
  contents: write

jobs:
  update-featured:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run update-featured script
        run: python3 .github/scripts/update-featured.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html feed.xml sitemap.xml
          git diff --cached --quiet && exit 0
          git commit -m "chore: auto-update featured post, feed, and sitemap"
          git push
