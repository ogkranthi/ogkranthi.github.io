name: Update featured post

on:
  push:
    branches: [main]
    paths:
      - '*.html'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-featured:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run update-featured script
        run: python3 .github/scripts/update-featured.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: auto-update featured post, feed, and sitemap"
          branch: auto/update-featured-${{ github.run_id }}
          title: "Auto-update featured post, feed, and sitemap"
          body: "This PR was created automatically by the workflow."
          base: main
          add-paths: |
            index.html
            feed.xml
            sitemap.xml
