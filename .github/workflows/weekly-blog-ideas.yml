name: Weekly queued blog issue for Copilot

on:
  schedule:
    - cron: "0 15 * * 2"   # Tuesday 11:00 AM New York during EDT
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  create-next-blog-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find next unused queued topic
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path(".github/blog-topic-queue.json")
          data = json.loads(path.read_text())

          out = Path("candidates.json")
          out.write_text(json.dumps(data))
          PY

          found="false"

          count=$(python3 - <<'PY'
          import json
          data=json.load(open("candidates.json"))
          print(len(data))
          PY
          )

          for i in $(seq 0 $((count-1))); do
            title=$(python3 - <<PY
          import json
          data=json.load(open("candidates.json"))
          print(data[$i]["title"])
          PY
            )

            exists=$(gh issue list \
              --repo "$REPO" \
              --search "in:title \"$title\"" \
              --state all \
              --limit 50 \
              --json title \
              --jq --arg TITLE "$title" '[.[] | select(.title == $TITLE)] | length')

            if [ "$exists" = "0" ]; then
              slug=$(python3 - <<PY
          import json
          data=json.load(open("candidates.json"))
          print(data[$i]["slug"])
          PY
              )

              labels=$(python3 - <<PY
          import json
          data=json.load(open("candidates.json"))
          print(",".join(data[$i].get("labels", [])))
          PY
              )

              body=$(python3 - <<PY
          import json
          data=json.load(open("candidates.json"))
          print(data[$i]["body"])
          PY
              )

              {
                echo "FOUND=true"
                echo "SLUG=$slug"
                echo "TITLE<<EOF"
                echo "$title"
                echo "EOF"
                echo "LABELS=$labels"
                echo "BODY<<EOF"
                echo "$body"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"

              found="true"
              break
            fi
          done

          if [ "$found" != "true" ]; then
            echo "FOUND=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if nothing queued
        if: steps.pick.outputs.FOUND != 'true'
        run: echo "No unused queued topics found."

      - name: Create next blog issue
        if: steps.pick.outputs.FOUND == 'true'
        id: create_issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TITLE: ${{ steps.pick.outputs.TITLE }}
          LABELS: ${{ steps.pick.outputs.LABELS }}
          BODY: ${{ steps.pick.outputs.BODY }}
        run: |
          set -euo pipefail

          issue_url=$(gh issue create \
            --repo "$REPO" \
            --title "$TITLE" \
            --label "$LABELS" \
            --body "$BODY")

          issue_number="${issue_url##*/}"
          echo "ISSUE_NUMBER=$issue_number" >> "$GITHUB_OUTPUT"
          echo "ISSUE_URL=$issue_url" >> "$GITHUB_OUTPUT"

      - name: Assign created issue to Copilot
        if: steps.create_issue.outputs.ISSUE_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.create_issue.outputs.ISSUE_NUMBER }}
          BASE_BRANCH: main
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing secret: COPILOT_ASSIGN_PAT"
            exit 1
          fi

          gh auth status

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$REPO/issues/$ISSUE_NUMBER/assignees" \
            --input - <<EOF
          {
            "assignees": ["copilot-swe-agent[bot]"],
            "agent_assignment": {
              "target_repo": "$REPO",
              "base_branch": "$BASE_BRANCH",
              "custom_instructions": "Follow repository Copilot instructions. For blog tasks, create or update the article file and update index.html, homepage post count, and featured tile when the issue requires publishing. Include inline SVG diagrams for each major workflow.",
              "custom_agent": "",
              "model": ""
            }
          }
          EOF
