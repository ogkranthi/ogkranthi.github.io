name: Weekly queued blog issue for Copilot

on:
  schedule:
    - cron: "0 15 * * 2"   # Tuesday 11:00 AM New York during EDT
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  create-next-blog-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find next unused queued topic
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          gh auth status >/dev/null

          gh issue list \
            --repo "$REPO" \
            --state all \
            --limit 200 \
            --json title > existing_issues.json

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          queue = json.loads(Path(".github/blog-topic-queue.json").read_text())
          existing = json.loads(Path("existing_issues.json").read_text())
          existing_titles = {item["title"] for item in existing}

          selected = None
          for item in queue:
              if item["title"] not in existing_titles:
                  selected = item
                  break

          out = Path(os.environ["GITHUB_OUTPUT"])

          if not selected:
              with out.open("a") as f:
                  f.write("FOUND=false\n")
              raise SystemExit(0)

          labels = ",".join(selected.get("labels", []))

          with out.open("a") as f:
              f.write("FOUND=true\n")
              f.write(f"SLUG={selected['slug']}\n")
              f.write("TITLE<<EOF\n")
              f.write(selected["title"] + "\n")
              f.write("EOF\n")
              f.write(f"LABELS={labels}\n")
              f.write("BODY<<EOF\n")
              f.write(selected["body"] + "\n")
              f.write("EOF\n")
          PY

      - name: Stop if nothing queued
        if: steps.pick.outputs.FOUND != 'true'
        run: echo "No unused queued topics found."

      - name: Create next blog issue
        if: steps.pick.outputs.FOUND == 'true'
        id: create_issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TITLE: ${{ steps.pick.outputs.TITLE }}
          LABELS: ${{ steps.pick.outputs.LABELS }}
          BODY: ${{ steps.pick.outputs.BODY }}
        run: |
          set -euo pipefail

          issue_url=$(gh issue create \
            --repo "$REPO" \
            --title "$TITLE" \
            --label "$LABELS" \
            --body "$BODY")

          issue_number="${issue_url##*/}"
          echo "ISSUE_NUMBER=$issue_number" >> "$GITHUB_OUTPUT"
          echo "ISSUE_URL=$issue_url" >> "$GITHUB_OUTPUT"

      - name: Assign created issue to Copilot
        if: steps.create_issue.outputs.ISSUE_NUMBER != ''
        env:
          GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ steps.create_issue.outputs.ISSUE_NUMBER }}
          BASE_BRANCH: main
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing secret: COPILOT_ASSIGN_PAT"
            exit 1
          fi

          gh auth status

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$REPO/issues/$ISSUE_NUMBER/assignees" \
            --input - <<EOF
          {
            "assignees": ["copilot-swe-agent[bot]"],
            "agent_assignment": {
              "target_repo": "$REPO",
              "base_branch": "$BASE_BRANCH",
              "custom_instructions": "Follow repository Copilot instructions. For blog tasks, create or update the article file and update index.html, homepage post count, and featured tile when the issue requires publishing. Include inline SVG diagrams for each major workflow.",
              "custom_agent": "",
              "model": ""
            }
          }
          EOF
