name: Assign blog issues to Copilot

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  assign-to-copilot:
    if: >
      github.event.label.name == 'blog-draft' ||
      github.event.label.name == 'blog-refresh' ||
      github.event.label.name == 'blog-publish'
    runs-on: ubuntu-latest

    steps:
      - name: Debug trigger
        run: |
          echo "Label: ${{ github.event.label.name }}"
          echo "Issue: #${{ github.event.issue.number }}"
          echo "Repo: ${{ github.repository }}"

      - name: Assign issue to Copilot
        env:
          GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BASE_BRANCH: main
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing secret: COPILOT_ASSIGN_PAT"
            exit 1
          fi

          gh auth status

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$REPO/issues/$ISSUE_NUMBER/assignees" \
            --input - <<EOF
          {
            "assignees": ["copilot-swe-agent[bot]"],
            "agent_assignment": {
              "target_repo": "$REPO",
              "base_branch": "$BASE_BRANCH",
              "custom_instructions": "Follow repository Copilot instructions. For blog tasks, create or update the article file and update index.html, homepage post count, and featured tile when the issue requires publishing.",
              "custom_agent": "",
              "model": ""
            }
          }
          EOF

      - name: Confirm assignee
        env:
          GH_TOKEN: ${{ secrets.COPILOT_ASSIGN_PAT }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json assignees
